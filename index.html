<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Games 5.4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:black;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
}

.hidden{display:none}

button{
padding:15px;
margin:10px;
background:black;
color:#0ff;
border:3px solid #0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1)}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

#msg{
position:absolute;
top:10px;
left:10px;
color:yellow;
}
</style>
</head>
<body>

<div id="msg"></div>

<!-- START -->
<div id="start" class="screen">
<h1>RETRO GAMES 5.4</h1>
<button onclick="go('menu')">START</button>
</div>

<!-- MENU -->
<div id="menu" class="screen hidden">
<h3>COINS: <span id="coins">0</span></h3>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="startDash()">DASH</button>
<button onclick="go('settings')">SETTINGS</button>
<button onclick="go('start')">BACK</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen hidden">
<button onclick="save()">SAVE SETTINGS</button>
<button onclick="go('menu')">BACK</button>
</div>

<canvas id="game"></canvas>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0
};

function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
msg.innerText="Saved!";
setTimeout(()=>msg.innerText="",2000);
}

// ===== NAV =====
function go(id){
stopGame();
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
game.style.display="none";
document.getElementById(id).classList.remove("hidden");
updateUI();
}

function updateUI(){
coins.innerText=data.coins;
}

// ===== CANVAS =====
const c=game;
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
onresize=resize;

let loop=null;
let keys={};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function stopGame(){
if(loop) clearInterval(loop);
loop=null;
}

// ===== SOCCER (FIXED) =====
function startSoccer(){
go(null);
c.style.display="block";

let player={x:200,y:200};
let enemy={x:c.width-200,y:200};
let ball={x:c.width/2,y:c.height/2};

loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// field
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// goals
ctx.fillStyle="white";
ctx.fillRect(0,c.height/2-100,20,200);
ctx.fillRect(c.width-20,c.height/2-100,20,200);

// ball
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,30,30);

// enemy
ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,30,30);

// movement
if(keys["ArrowUp"])player.y-=5;
if(keys["ArrowDown"])player.y+=5;
if(keys["ArrowLeft"])player.x-=5;
if(keys["ArrowRight"])player.x+=5;

// ball follow
if(Math.abs(player.x-ball.x)<30){
ball.x=player.x;
ball.y=player.y;
}

// enemy AI
let dx=ball.x-enemy.x;
let dy=ball.y-enemy.y;
enemy.x+=dx*0.03;
enemy.y+=dy*0.03;

// steal
if(Math.abs(enemy.x-ball.x)<30){
ball.x-=5;
}

// scoring
if(ball.x>c.width-20){
data.coins+=50;
save();
msg.innerText="+50 coins!";
setTimeout(()=>msg.innerText="",1500);
go("menu");
}
if(ball.x<20){
go("menu");
}

},30);
}

// ===== DASH (FIXED COLLISION) =====
function startDash(){
go(null);
c.style.display="block";

let x=200;
let y=c.height-150;
let vel=0;

let spikes=[400,600,800];

loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// background
ctx.fillStyle="#111";
ctx.fillRect(0,0,c.width,c.height);

// ground
ctx.fillStyle="#333";
ctx.fillRect(0,c.height-100,c.width,100);

// spikes
ctx.fillStyle="red";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s,c.height-100);
ctx.lineTo(s+20,c.height-140);
ctx.lineTo(s+40,c.height-100);
ctx.fill();

// collision FIXED
if(x+40>s && x<s+40 && y+40>c.height-120){
msg.innerText="You Died!";
setTimeout(()=>msg.innerText="",1500);
go("menu");
}
});

// cube
ctx.fillStyle="cyan";
ctx.fillRect(x,y,40,40);

// jump
if(keys[" "] && y>=c.height-150){
vel=-15;
}

vel+=1;
y+=vel;

if(y>c.height-150){
y=c.height-150;
vel=0;
}

x+=6;

},30);
}

// INIT
go("start");
updateUI();

</script>

</body>
</html>
