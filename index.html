<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Games Base</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:black;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
}

.hidden{display:none}

button{
padding:15px;
margin:10px;
border:3px solid #0ff;
background:black;
color:#0ff;
cursor:pointer;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

#topUI{
position:absolute;
top:10px;
left:10px;
color:yellow;
z-index:20;
}
</style>
</head>

<body>

<div id="topUI">Coins: <span id="coins">0</span></div>

<div id="start" class="screen">
<h1>RETRO GAMES</h1>
<button onclick="showScreen('menu')">START</button>
</div>

<div id="menu" class="screen hidden">
<button onclick="startSoccer()">SOCCER</button>
<button onclick="startDash()">DASH</button>
<button onclick="showScreen('start')">BACK</button>
</div>

<canvas id="game"></canvas>

<script src="main.js"></script>
<script src="soccer.js"></script>
<script src="dash.js"></script>

</body>
</html>
