<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 5.2</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:url("https://images.unsplash.com/photo-1511512578047-dfb367046420") center/cover;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.6);
}

.hidden{display:none}

button{
padding:20px;
margin:10px;
background:black;
color:#0ff;
border:3px solid #0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1)}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#editorBox{
width:500px;
height:300px;
border:4px solid white;
position:relative;
margin-bottom:20px;
}

.player{
width:30px;
height:30px;
background:blue;
position:absolute;
cursor:grab;
}

.goalBtn{
background:#2c6ed5;
padding:10px;
margin:5px;
}

#topUI{position:absolute;top:10px;left:10px;z-index:3}
#bottomUI{position:absolute;bottom:10px;left:10px;z-index:3}
</style>
</head>
<body>

<!-- START -->
<div id="start" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="go('menu')">START</button>
</div>

<!-- MENU -->
<div id="menu" class="screen hidden">
<button onclick="go('soccerMenu')">SOCCER</button>
<button onclick="startDash()">DASH</button>
<button onclick="go('settings')">SETTINGS</button>
<button onclick="go('editor')">TEAM EDITOR</button>
</div>

<!-- SOCCER MENU -->
<div id="soccerMenu" class="screen hidden">
<button onclick="startSoccer()">NORMAL</button>
<button onclick="startWorldCup()">WORLD CUP (LVL 10)</button>
<button onclick="go('onlineMenu')">1V1</button>
<button onclick="go('menu')">BACK</button>
</div>

<!-- ONLINE -->
<div id="onlineMenu" class="screen hidden">
<button onclick="createRoom()">CREATE ROOM</button>
<button onclick="joinRoom()">JOIN ROOM</button>
<button onclick="go('soccerMenu')">BACK</button>
<p id="roomCode"></p>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen hidden">
<h3>DIFFICULTY</h3>
<button onclick="setDiff(1)">EASY</button>
<button onclick="setDiff(2)">NORMAL</button>
<button onclick="setDiff(3)">HARD</button>
<button onclick="setDiff(4)">EXTREME</button>

<h3>SPEED</h3>
<button onclick="setSpeed(1)">NORMAL</button>
<button onclick="setSpeed(2)">FAST</button>
<button onclick="setSpeed(3)">INSANE</button>

<button onclick="go('menu')">BACK</button>
</div>

<!-- EDITOR -->
<div id="editor" class="screen hidden">
<div id="editorBox"></div>

<div>
GOALS:
<button class="goalBtn" onclick="setGoals(1)">1</button>
<button class="goalBtn" onclick="setGoals(3)">3</button>
<button class="goalBtn" onclick="setGoals(5)">5</button>
</div>

<button onclick="saveLayout()">SAVE</button>
<button onclick="go('menu')">BACK</button>
</div>

<div id="topUI">🪙 <span id="coins"></span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0,lvl:1,user:null,
layout:[{x:50,y:50},{x:200,y:150},{x:350,y:250}],
goals:1,
difficulty:2,
speed:1
};

if(!data.user) data.user=prompt("Username");

// SAVE
function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
coins.innerText=data.coins;
lvl.innerText=data.lvl;
user.innerText=data.user;
}

// NAV
function go(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

// SETTINGS
function setDiff(d){data.difficulty=d;save()}
function setSpeed(s){data.speed=s;save()}
function setGoals(g){data.goals=g;save()}

// ===== EDITOR =====
let dragging=null;

function loadEditor(){
let box=editorBox;
box.innerHTML="";
data.layout.forEach((p,i)=>{
let el=document.createElement("div");
el.className="player";
el.style.left=p.x+"px";
el.style.top=p.y+"px";
el.onmousedown=()=>dragging=el;
box.appendChild(el);
});

document.onmousemove=e=>{
if(dragging){
let r=box.getBoundingClientRect();
dragging.style.left=(e.clientX-r.left-15)+"px";
dragging.style.top=(e.clientY-r.top-15)+"px";
}
};
document.onmouseup=()=>dragging=null;
}

function saveLayout(){
document.querySelectorAll(".player").forEach((p,i)=>{
data.layout[i]={x:parseInt(p.style.left),y:parseInt(p.style.top)};
});
save();
}

// ===== CANVAS =====
const c=game;
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();
onresize=resize;

let keys={};
onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== SOCCER =====
function startSoccer(){
go("");
let players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
let enemies=[{x:c.width-200,y:200},{x:c.width-200,y:350},{x:c.width-200,y:500}];
let ball={x:c.width/2,y:c.height/2};
let current=0;
let score=0,enemyScore=0;

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// field
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// goals
ctx.fillStyle="white";
ctx.fillRect(20,c.height/2-120,20,240);
ctx.fillRect(c.width-40,c.height/2-120,20,240);

// ball
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// players
players.forEach(p=>{
ctx.fillStyle="blue";
ctx.fillRect(p.x,p.y,30,30);
});

// enemies FIXED AI
enemies.forEach((e,i)=>{
let dx=ball.x-e.x;
let dy=ball.y-e.y;
e.x+=dx*0.03*data.difficulty;
e.y+=dy*0.03*data.difficulty;

// separation
enemies.forEach(o=>{
if(o!==e){
let d=Math.hypot(e.x-o.x,e.y-o.y);
if(d<40){e.x+=(e.x-o.x)*0.1;e.y+=(e.y-o.y)*0.1;}
}
});

ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,30,30);

// steal
if(Math.abs(e.x-ball.x)<25){
ball.x-=6;
}
});

// movement (MULTI KEY FIX)
let p=players[current];
let speed=5*data.speed;

if(keys["ArrowUp"])p.y-=speed;
if(keys["ArrowDown"])p.y+=speed;
if(keys["ArrowLeft"])p.x-=speed;
if(keys["ArrowRight"])p.x+=speed;

// ball lock
if(Math.abs(p.x-ball.x)<30){
ball.x=p.x;
ball.y=p.y;
}

// goals FIX (NO OUT OF BOUNDS)
if(ball.x>c.width-50){score++;reset();}
if(ball.x<50){enemyScore++;reset();}

ctx.fillText(score+"-"+enemyScore,c.width/2,50);

if(score>=data.goals || enemyScore>=data.goals){
end(score>enemyScore);
}

},30);

function reset(){
ball.x=c.width/2;
ball.y=c.height/2;
players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
}

function end(win){
data.coins+=win?(50*data.goals):20;
data.lvl++;
save();
go("soccerMenu");
}
}

// WORLD CUP (HARDER)
function startWorldCup(){
if(data.lvl<10){alert("LOCKED");return;}
data.goals=5;
data.difficulty=4;
startSoccer();
}

// DASH (kept)
function startDash(){alert("Dash still here")}

// ONLINE MOCK
function createRoom(){
let code=Math.random().toString(36).substring(2,6).toUpperCase();
roomCode.innerText="CODE: "+code;
}
function joinRoom(){
let c=prompt("Enter Code");
alert("Joined "+c+" (mock)");
}

// INIT
go("start");
save();
loadEditor();

</script>

</body>
</html>
