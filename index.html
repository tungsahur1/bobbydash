<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Press Start 2P';
  color:#0ff;
  overflow:hidden;
  background:linear-gradient(135deg,#000428,#004e92);
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hidden{display:none}

button{
  padding:25px;
  margin:15px;
  font-size:16px;
  background:black;
  color:#0ff;
  border:4px solid #0ff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.1);
}

#patch{
  position:absolute;
  bottom:20px;
  text-align:center;
  font-size:10px;
  color:white;
}

#topUI{position:absolute;top:10px;left:10px}
#bottomUI{position:absolute;bottom:10px;left:10px}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>
<body>

<div id="startScreen" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<div id="menuScreen" class="screen hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openUpgrades()">UPGRADES</button>
<button onclick="openShop()">SHOP</button>
<div id="patch">
PATCH 3.0:<br>
• Soccer 3v3<br>
• Football Mode<br>
• Dash Hard Mode<br>
• XP Orbs Added
</div>
</div>

<div id="gamesScreen" class="screen hidden">
<button onclick="startDash()">DASH</button>
<button onclick="startFootball()">FOOTBALL</button>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<div id="upgradeScreen" class="screen hidden">
<button onclick="upgradeCoins()">COIN BOOST</button>
<button onclick="editTeam()">SOCCER TEAM</button>
<button onclick="backMenu()">BACK</button>
</div>

<div id="shopScreen" class="screen hidden">
<button onclick="riskUpgrade()">RISK MODE (60)</button>
<button onclick="backMenu()">BACK</button>
</div>

<div id="topUI">🪙 <span id="coins">0</span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0,lvl:1,user:null,boost:1,risk:false
};

if(!data.user) data.user=prompt("Username");

// SCREENS
const screens={
start:startScreen,
menu:menuScreen,
games:gamesScreen,
upgrade:upgradeScreen,
shop:shopScreen
};

function show(name){
Object.values(screens).forEach(s=>s.classList.add("hidden"));
if(screens[name]) screens[name].classList.remove("hidden");
}

// SAVE
function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
coins.innerText=data.coins;
lvl.innerText=data.lvl;
user.innerText=data.user;
}

// NAV
function startGame(){show("menu");save()}
function openGames(){show("games")}
function openUpgrades(){show("upgrade")}
function openShop(){show("shop")}
function backMenu(){show("menu")}

// CANVAS
const c=document.getElementById("game");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let loop;
function stop(){clearInterval(loop);document.onkeydown=null}

// XP ORBS
function xpOrbs(){
let orbs=[];
for(let i=0;i<10;i++){
orbs.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

let anim=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="yellow";

orbs.forEach(o=>{
o.x+=(c.width-50-o.x)*0.05;
o.y+=(c.height-50-o.y)*0.05;
ctx.beginPath();
ctx.arc(o.x,o.y,5,0,6.28);
ctx.fill();
});

},30);

setTimeout(()=>clearInterval(anim),1000);
}

// ================= DASH =================
function startDash(){
stop();show(null);

let y=c.height-150,vy=0;
let spikes=[];

loop=setInterval(()=>{
ctx.fillStyle="#111";
ctx.fillRect(0,0,c.width,c.height);

vy+=1;y+=vy;
if(y>c.height-150){y=c.height-150;vy=0}

ctx.fillStyle="white";
ctx.fillRect(200,y,50,50);

if(Math.random()<0.05){
spikes.push({x:c.width});
}

ctx.fillStyle="red";
spikes.forEach(s=>{
s.x-=15;
ctx.fillRect(s.x,c.height-150,40,40);

if(s.x<250 && s.x>180 && y>c.height-200){
endDash(false);
}
});
},30);

document.onkeydown=e=>{
if(e.key==="ArrowUp"&&y===c.height-150)vy=-20;
};
}

function endDash(win){
stop();
let reward=win?100:30;
if(data.risk){reward*=2}
data.coins+=reward;
data.lvl++;
xpOrbs();
save();
show("games");
}

// ================= SOCCER =================
function startSoccer(){
stop();show(null);

let players=[
{x:200,y:200},{x:200,y:350},{x:200,y:500}
];

let enemies=[
{x:c.width-200,y:200},{x:c.width-200,y:350},{x:c.width-200,y:500}
];

let ball={x:c.width/2,y:c.height/2};

loop=setInterval(()=>{
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// crowd
for(let i=0;i<50;i++){
ctx.fillStyle="gray";
ctx.fillRect(Math.random()*c.width,Math.random()*100,2,10);
}

// goals
ctx.fillStyle="white";
ctx.fillRect(20,c.height/2-100,10,200);
ctx.fillRect(c.width-30,c.height/2-100,10,200);

// ball
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// players
ctx.fillStyle="blue";
players.forEach(p=>{
ctx.fillRect(p.x,p.y,20,20);
});

ctx.fillStyle="red";
enemies.forEach(e=>{
e.x+=Math.random()*4-2;
e.y+=Math.random()*4-2;
ctx.fillRect(e.x,e.y,20,20);

// enemy goal
if(Math.abs(e.x-ball.x)<20 && Math.abs(e.y-ball.y)<20){
ball.x-=5;
}
});

// player control
if(Math.abs(players[0].x-ball.x)<20){
ball.x+=5;
}

// score
if(ball.x>c.width-40){endSoccer(true)}
if(ball.x<40){endSoccer(false)}

},30);

document.onkeydown=e=>{
if(e.key==="ArrowUp")players[0].y-=10;
if(e.key==="ArrowDown")players[0].y+=10;
if(e.key==="ArrowLeft")players[0].x-=10;
if(e.key==="ArrowRight")players[0].x+=10;
};
}

function endSoccer(win){
stop();
let reward=win?120:20;
data.coins+=reward;
xpOrbs();
save();
show("games");
}

// ================= FOOTBALL =================
function startFootball(){
stop();show(null);

let p={x:100,y:c.height/2};
let ball={x:c.width/2,y:c.height/2};

loop=setInterval(()=>{
ctx.fillStyle="#0a5";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="white";
ctx.fillRect(ball.x,ball.y,10,10);

ctx.fillStyle="blue";
ctx.fillRect(p.x,p.y,20,20);

if(Math.abs(p.x-ball.x)<20){
ball.x+=10;
}

if(ball.x>c.width-50){
endFootball(true);
}

},30);

document.onkeydown=e=>{
if(e.key==="ArrowUp")p.y-=10;
if(e.key==="ArrowDown")p.y+=10;
if(e.key==="ArrowLeft")p.x-=10;
if(e.key==="ArrowRight")p.x+=10;
};
}

function endFootball(win){
stop();
let reward=win?150:50;
if(data.risk){reward*=2}else if(!win){reward/=2}
data.coins+=reward;
xpOrbs();
save();
show("games");
}

// ================= UPGRADES =================
function upgradeCoins(){
if(data.coins>=50){
data.coins-=50;
data.boost+=0.5;
save();
}
}

function editTeam(){
alert("TEAM EDITOR COMING NEXT UPDATE");
}

// ================= SHOP =================
function riskUpgrade(){
if(data.coins>=60){
data.coins-=60;
data.risk=true;
alert("HIGH RISK ENABLED");
save();
}
}

// INIT
show("start");
save();

</script>

</body>
</html>
