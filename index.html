<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino FINAL FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;background:black;color:#0ff;font-family:'Press Start 2P';overflow:hidden}
button{font-family:'Press Start 2P';padding:20px;margin:10px;background:black;color:#0ff;border:3px solid #0ff;cursor:pointer}
.hidden{display:none}
#startScreen{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(#020024,#090979,#00d4ff)}
#menuScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
</style>
</head>
<body>

<div id="startScreen">
<h1>RETRO CASINO</h1>
<button id="startBtn">START</button>
</div>

<div id="menuScreen" class="hidden">
<button id="testBtn">TEST BUTTON</button>
</div>

<script>

// SIMPLE TEST VERSION (NO BREAKS)

const startBtn = document.getElementById('startBtn');
const startScreen = document.getElementById('startScreen');
const menuScreen = document.getElementById('menuScreen');
const testBtn = document.getElementById('testBtn');

startBtn.addEventListener('click', () => {
  console.log('START CLICKED');
  startScreen.classList.add('hidden');
  menuScreen.classList.remove('hidden');
});

testBtn.addEventListener('click', () => {
  alert('BUTTON WORKS');
});

</script>

</body>
</html>
