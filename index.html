<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RETRO CASINO 1.05</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Press Start 2P';overflow:hidden;background:black}
canvas{position:absolute;top:0;left:0;width:100vw;height:100vh}
button{font-family:'Press Start 2P';background:#000;color:#0ff;border:3px solid #0ff;padding:20px;margin:15px;font-size:14px;cursor:pointer}
.hidden{display:none}
#startScreen{position:absolute;width:100%;height:100%;background:linear-gradient(#020024,#090979,#00d4ff);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white}
#menuScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#ui{position:absolute;top:10px;left:10px;color:#0ff}
#bottomBar{position:absolute;bottom:10px;left:10px;color:#fff}
#version{position:absolute;bottom:10px;right:10px;color:#fff}
#patchNotes{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:3px solid #0ff;padding:20px;width:80%;max-height:70%;overflow:auto}
</style>
</head>
<body>

<div id="startScreen">
<h1>RETRO CASINO</h1>
<button id="startBtn">START</button>
<button id="patchBtn">PATCH NOTES</button>
<div id="version">VERSION 1.05</div>
</div>

<div id="patchNotes" class="hidden">
<h2>PATCH NOTES 1.05</h2>
<p>- Full gameplay fixed</p>
<p>- All buttons working</p>
<p>- Dash, Soccer, Betting playable</p>
<button id="closePatch">CLOSE</button>
</div>

<div id="ui" class="hidden">
<span>🪙 <span id="coins">0</span></span>
</div>

<div id="bottomBar" class="hidden">
<span id="user"></span> | LVL <span id="lvl"></span> | XP <span id="xp"></span>
</div>

<div id="menuScreen" class="hidden">
<button id="dashBtn">DASH RUN</button>
<button id="betBtn">RETRO BALL</button>
<button id="soccerBtn">SOCCER</button>
</div>

<div id="betScreen" class="hidden">
<h3 style="color:white">BET ON A TEAM</h3>
<button onclick="startBet(0)">RED</button>
<button onclick="startBet(1)">BLUE</button>
<button onclick="startBet(2)">GREEN</button>
<button onclick="startBet(3)">YELLOW</button>
</div>

<canvas id="game"></canvas>

<script>
let data=JSON.parse(localStorage.getItem('retroUltra'))||{coins:0,xp:0,lvl:1,user:null};
if(!data.user){data.user=prompt('ENTER USERNAME');}

const c=document.getElementById('game');
const ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
resize();window.onresize=resize;

function save(){localStorage.setItem('retroUltra',JSON.stringify(data));coins.innerText=data.coins;xp.innerText=data.xp;lvl.innerText=data.lvl;user.innerText=data.user}
function gainXP(n){data.xp+=n;if(data.xp>=data.lvl*100){data.xp=0;data.lvl++;}}
function clear(){ctx.fillStyle='#111';ctx.fillRect(0,0,c.width,c.height)}

function startGame(){startScreen.classList.add('hidden');menuScreen.classList.remove('hidden');ui.classList.remove('hidden');bottomBar.classList.remove('hidden');save();}
function showPatch(){patchNotes.classList.remove('hidden');}
function hidePatch(){patchNotes.classList.add('hidden');}

let loop;
function stop(){clearInterval(loop);document.onkeydown=null}

// DASH
function dash(){stop();menuScreen.classList.add('hidden');
let x=150,y=c.height-200,vy=0,spikes=[];
loop=setInterval(()=>{
clear();vy+=1;y+=vy;if(y>c.height-200){y=c.height-200;vy=0}
ctx.fillStyle='white';ctx.fillRect(x,y,40,40);
if(Math.random()<0.04)spikes.push({x:c.width,y:c.height-200});
ctx.fillStyle='magenta';
spikes.forEach(s=>{s.x-=12;ctx.beginPath();ctx.moveTo(s.x,s.y+40);ctx.lineTo(s.x+20,s.y);ctx.lineTo(s.x+40,s.y+40);ctx.fill();
if(s.x<x+40&&s.x+40>x&&y>c.height-230){endDash()}});
},30);
document.onkeydown=e=>{if(e.key==='ArrowUp'&&y===c.height-200)vy=-20};}
function endDash(){stop();let r=50+Math.random()*50;data.coins+=Math.floor(r);gainXP(20);alert('CRASH +'+Math.floor(r));save();menuScreen.classList.remove('hidden')}

// BET
function startBet(choice){stop();betScreen.classList.add('hidden');
let players=[0,0,0,0];
loop=setInterval(()=>{
clear();players=players.map(p=>p+Math.random()*8);
players.forEach((p,i)=>{ctx.fillStyle=['red','blue','green','yellow'][i];ctx.fillRect(p,100+i*100,60,40);});
let win=players.indexOf(Math.max(...players));
if(players[win]>c.width-120){stop();if(win===choice){data.coins+=100;gainXP(30);alert('WIN +100')}else alert('LOSE');save();menuScreen.classList.remove('hidden');}
},30);
}

// SOCCER
function soccer(){stop();menuScreen.classList.add('hidden');
let p={x:60,y:c.height/2};let defs=[{x:c.width/2,y:150},{x:c.width/2,y:350}];
loop=setInterval(()=>{
clear();ctx.fillStyle='white';ctx.fillRect(c.width-60,c.height/2-80,10,160);
ctx.fillStyle='yellow';ctx.fillRect(p.x,p.y,20,40);ctx.beginPath();ctx.arc(p.x+10,p.y-5,6,0,6.28);ctx.fill();
ctx.fillStyle='red';defs.forEach(d=>{d.y+=Math.random()*8-4;ctx.fillRect(d.x,d.y,20,40);
if(Math.abs(p.x-d.x)<25&&Math.abs(p.y-d.y)<40){endSoccer(false)}});
if(p.x>c.width-70){endSoccer(true)}
},30);
document.onkeydown=e=>{if(e.key==='ArrowUp')p.y-=12;if(e.key==='ArrowDown')p.y+=12;if(e.key==='ArrowLeft')p.x-=12;if(e.key==='ArrowRight')p.x+=12};}
function endSoccer(win){stop();if(win){let r=80+Math.random()*40;data.coins+=Math.floor(r);gainXP(40);alert('GOAL +'+Math.floor(r))}else alert('TACKLED');save();menuScreen.classList.remove('hidden')}

// BUTTONS
startBtn.onclick=startGame;
patchBtn.onclick=showPatch;
closePatch.onclick=hidePatch;
dashBtn.onclick=dash;
betBtn.onclick=()=>{menuScreen.classList.add('hidden');betScreen.classList.remove('hidden')};
soccerBtn.onclick=soccer;

save();
</script>

</body>
</html>
