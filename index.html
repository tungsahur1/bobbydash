<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Games Rebuild</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
background: radial-gradient(circle at center, #111 0%, #000 100%);
color:#0ff;
overflow:hidden;
}

/* PANELS */
.panel{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter: blur(6px);
}

.hidden{display:none}

/* BUTTON STYLE (NEW LOOK) */
.btn{
padding:18px 30px;
margin:12px;
background:#111;
border:2px solid #0ff;
color:#0ff;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.1);
background:#0ff;
color:#000;
}

/* TOP BAR */
#topbar{
position:absolute;
top:10px;
left:10px;
color:gold;
font-size:14px;
z-index:10;
}

/* CANVAS */
canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}
</style>
</head>

<body>

<div id="topbar">Coins: <span id="coins">0</span></div>

<!-- START -->
<div id="start" class="panel">
<h1>RETRO GAMES</h1>
<button class="btn" onclick="go('menu')">START</button>
</div>

<!-- MENU -->
<div id="menu" class="panel hidden">
<button class="btn" onclick="playSoccer()">SOCCER</button>
<button class="btn" onclick="playDash()">DASH</button>
<button class="btn" onclick="go('start')">BACK</button>
</div>

<canvas id="game"></canvas>

<script>

// ===== CORE =====
const game = document.getElementById("game");
const ctx = game.getContext("2d");

function resize(){
game.width = innerWidth;
game.height = innerHeight;
}
resize();
onresize = resize;

// ===== DATA =====
let saveData = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0
};

function save(){
localStorage.setItem("retroSave", JSON.stringify(saveData));
updateUI();
}

function updateUI(){
document.getElementById("coins").innerText = saveData.coins;
}

// ===== SCREENS =====
function go(id){
stop();
document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"));
game.style.display="none";
document.getElementById(id).classList.remove("hidden");
}

// ===== INPUT =====
let keys = {};
onkeydown = e=>keys[e.key]=true;
onkeyup = e=>keys[e.key]=false;

// ===== LOOP =====
let loop = null;
function stop(){
if(loop) clearInterval(loop);
loop=null;
}

// =========================
// ⚽ SOCCER GAME
// =========================
function drawPlayer(p,color){
ctx.fillStyle="#ffd39b";
ctx.fillRect(p.x+8,p.y-8,14,14);

ctx.fillStyle=color;
ctx.fillRect(p.x,p.y,30,20);

ctx.fillStyle="white";
ctx.fillRect(p.x+3,p.y+20,8,12);
ctx.fillRect(p.x+18,p.y+20,8,12);
}

function playSoccer(){
go(null);
game.style.display="block";

let players=[
{x:150,y:200},
{x:150,y:350},
{x:150,y:500}
];

let enemies=[
{x:game.width-150,y:200},
{x:game.width-150,y:350},
{x:game.width-150,y:500}
];

let selected=0;
let ball={x:game.width/2,y:game.height/2,owner:null};

// PASS
game.onclick=(e)=>{
let rect=game.getBoundingClientRect();
let mx=e.clientX-rect.left;
let my=e.clientY-rect.top;

players.forEach((p,i)=>{
if(Math.hypot(mx-p.x,my-p.y)<40){
selected=i;
if(ball.owner!==null) ball.owner=i;
}
});
};

loop=setInterval(()=>{
ctx.clearRect(0,0,game.width,game.height);

// FIELD
ctx.fillStyle="#0a7a0a";
ctx.fillRect(0,0,game.width,game.height);

// GOALS
ctx.fillStyle="white";
ctx.fillRect(0,game.height/2-120,20,240);
ctx.fillRect(game.width-20,game.height/2-120,20,240);

// CONTROL
let p=players[selected];

if(keys["ArrowUp"]) p.y-=6;
if(keys["ArrowDown"]) p.y+=6;
if(keys["ArrowLeft"]) p.x-=6;
if(keys["ArrowRight"]) p.x+=6;

// PICK BALL
if(Math.hypot(p.x-ball.x,p.y-ball.y)<30){
ball.owner=selected;
}

// AI
enemies.forEach(e=>{
let dx=ball.x-e.x;
let dy=ball.y-e.y;

e.x+=dx*0.04;
e.y+=dy*0.04;

if(Math.hypot(e.x-ball.x,e.y-ball.y)<25){
ball.owner=null;
}

// separation
enemies.forEach(o=>{
if(o!==e){
let d=Math.hypot(e.x-o.x,e.y-o.y);
if(d<40){
e.x+=(e.x-o.x)*0.1;
e.y+=(e.y-o.y)*0.1;
}
}
});
});

// BALL FOLLOW
if(ball.owner!==null){
let owner=players[ball.owner];
ball.x=owner.x+15;
ball.y=owner.y+10;
}

// DRAW
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,8,0,6.28);
ctx.fill();

players.forEach((pl,i)=>{
drawPlayer(pl,i===selected?"#00ffff":"#008888");
});

enemies.forEach(e=>{
drawPlayer(e,"red");
});

// SCORE
if(ball.x>game.width-20){
saveData.coins+=100;
save();
go("menu");
}

if(ball.x<20){
go("menu");
}

},30);
}

// =========================
// 🟦 DASH GAME
// =========================
function playDash(){
go(null);
game.style.display="block";

let x=200;
let y=game.height-150;
let vel=0;

let spikes=[400,500,600,750,900];

loop=setInterval(()=>{
ctx.clearRect(0,0,game.width,game.height);

// BG
ctx.fillStyle="#001122";
ctx.fillRect(0,0,game.width,game.height);

// GROUND
ctx.fillStyle="#222";
ctx.fillRect(0,game.height-100,game.width,100);

// SPIKES
ctx.fillStyle="#ff0044";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s,game.height-100);
ctx.lineTo(s+20,game.height-140);
ctx.lineTo(s+40,game.height-100);
ctx.fill();

if(x+40>s && x<s+40 && y+40>game.height-120){
go("menu");
}
});

// PLAYER
ctx.fillStyle="#00ffff";
ctx.fillRect(x,y,40,40);

// JUMP
if(keys[" "] && y>=game.height-150){
vel=-12;
}

vel+=0.8;
y+=vel;

if(y>game.height-150){
y=game.height-150;
vel=0;
}

x+=9;

},30);
}

// INIT
updateUI();
go("start");

</script>

</body>
</html>
