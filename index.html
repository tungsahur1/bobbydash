<!DOCTYPE html>
<html>
<head>
<title>Retro Games v5.5</title>
<style>
body{
margin:0;
background:linear-gradient(#000,#001a2f);
color:#0ff;
font-family:monospace;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}
.active{display:flex;}

button{
padding:15px 40px;
margin:10px;
border:3px solid #0ff;
background:black;
color:#0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1);}

#topbar{
position:absolute;
top:10px;
left:10px;
color:gold;
}

canvas{
position:absolute;
top:0;
left:0;
display:none;
}
</style>
</head>

<body>

<div id="topbar">Coins: 0 | XP: 0 | LVL: 1</div>

<div id="menu" class="screen active">
<h1>RETRO GAMES</h1>
<button onclick="show('soccerMenu')">SOCCER</button>
<button onclick="startDash()">DASH</button>
<button onclick="show('patch')">PATCH NOTES</button>
</div>

<div id="soccerMenu" class="screen">
<button onclick="startSoccer(3,3)">NORMAL</button>
<button onclick="startSoccer(5,5)">WORLD CUP</button>
<button onclick="show('menu')">BACK</button>
</div>

<div id="patch" class="screen">
<h3>PATCH NOTES 5.5</h3>
<p>• Full soccer rework</p>
<p>• Passing + switching system</p>
<p>• AI improved</p>
<p>• Dash overhaul</p>
<p>• White screen fixed</p>
<p>• Data sync added</p>
<p>credit to bobby vin vin and ryan for the ideas of this website.</p>
<button onclick="show('menu')">BACK</button>
</div>

<canvas id="game"></canvas>

<script src="main.js"></script>
<script src="soccer.js"></script>
<script src="dash.js"></script>

</body>
</html>
