<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Press Start 2P';
  background:#000;
  color:#0ff;
  overflow:hidden;
}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.hidden{display:none}

/* BUTTONS */
button{
  padding:25px;
  margin:15px;
  font-size:16px;
  background:black;
  color:#0ff;
  border:4px solid #0ff;
  cursor:pointer;
  transition:0.2s;
}

button:hover{transform:scale(1.1)}

/* UI */
#topUI{position:absolute;top:10px;left:10px;z-index:3}
#bottomUI{position:absolute;bottom:10px;left:10px;z-index:3}

/* CANVAS FIXED */
canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openUpgrades()">UPGRADES</button>
<button onclick="openShop()">SHOP</button>
</div>

<!-- GAMES -->
<div id="gamesScreen" class="screen hidden">
<button onclick="startDash()">DASH</button>
<button onclick="startFootball()">FOOTBALL</button>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- UPGRADES -->
<div id="upgradeScreen" class="screen hidden">
<button onclick="upgradeCoins()">COIN BOOST</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
<button onclick="riskUpgrade()">RISK MODE (60)</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- UI -->
<div id="topUI">🪙 <span id="coins">0</span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0,lvl:1,user:null,risk:false
};

if(!data.user) data.user = prompt("Username");

// ===== SCREENS =====
const screens = {
start: document.getElementById("startScreen"),
menu: document.getElementById("menuScreen"),
games: document.getElementById("gamesScreen"),
upgrade: document.getElementById("upgradeScreen"),
shop: document.getElementById("shopScreen")
};

function show(name){
  Object.values(screens).forEach(s=>s.classList.add("hidden"));
  if(name && screens[name]) screens[name].classList.remove("hidden");
}

// ===== SAVE =====
function save(){
  localStorage.setItem("retroSave", JSON.stringify(data));
  coins.innerText=data.coins;
  lvl.innerText=data.lvl;
  user.innerText=data.user;
}

// ===== NAV =====
function startGame(){ show("menu"); save(); }
function openGames(){ show("games"); }
function openUpgrades(){ show("upgrade"); }
function openShop(){ show("shop"); }
function backMenu(){ show("menu"); }

// ===== CANVAS =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
  c.width=window.innerWidth;
  c.height=window.innerHeight;
}
resize();
window.onresize=resize;

// ===== CORE FIX =====
let loop=null;

function clearCanvas(){
  ctx.clearRect(0,0,c.width,c.height);
}

function stopGame(){
  if(loop) clearInterval(loop);
  loop=null;
  document.onkeydown=null;
  clearCanvas(); // 🔥 THIS FIXES WHITE SCREEN
}

// ===== DASH =====
function startDash(){
  stopGame();
  show();

  let y=c.height-150,vy=0;
  let spikes=[];

  loop=setInterval(()=>{
    clearCanvas();

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,c.width,c.height);

    vy+=1;y+=vy;
    if(y>c.height-150){y=c.height-150;vy=0}

    ctx.fillStyle="white";
    ctx.fillRect(200,y,50,50);

    if(Math.random()<0.05) spikes.push({x:c.width});

    ctx.fillStyle="red";
    spikes.forEach(s=>{
      s.x-=12;
      ctx.fillRect(s.x,c.height-150,40,40);

      if(s.x<250 && s.x>180 && y>c.height-200){
        endDash();
      }
    });

  },30);

  document.onkeydown=e=>{
    if(e.key==="ArrowUp" && y===c.height-150) vy=-20;
  };
}

function endDash(){
  stopGame();
  data.coins+=50;
  data.lvl++;
  save();
  show("games");
}

// ===== SOCCER =====
function startSoccer(){
  stopGame();
  show();

  let p={x:100,y:c.height/2};
  let ball={x:c.width/2,y:c.height/2};

  loop=setInterval(()=>{
    clearCanvas();

    ctx.fillStyle="green";
    ctx.fillRect(0,0,c.width,c.height);

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,10,0,6.28);
    ctx.fill();

    ctx.fillStyle="blue";
    ctx.fillRect(p.x,p.y,30,30);

    if(Math.abs(p.x-ball.x)<30){
      ball.x+=5;
    }

    if(ball.x>c.width-50){
      endSoccer();
    }

  },30);

  document.onkeydown=e=>{
    if(e.key==="ArrowUp")p.y-=10;
    if(e.key==="ArrowDown")p.y+=10;
    if(e.key==="ArrowLeft")p.x-=10;
    if(e.key==="ArrowRight")p.x+=10;
  };
}

function endSoccer(){
  stopGame();
  data.coins+=100;
  save();
  show("games");
}

// ===== FOOTBALL =====
function startFootball(){
  stopGame();
  show();

  let p={x:100,y:c.height/2};
  let ball={x:c.width/2,y:c.height/2};

  loop=setInterval(()=>{
    clearCanvas();

    ctx.fillStyle="#063";
    ctx.fillRect(0,0,c.width,c.height);

    ctx.fillStyle="white";
    ctx.fillRect(ball.x,ball.y,10,10);

    ctx.fillStyle="blue";
    ctx.fillRect(p.x,p.y,30,30);

    if(Math.abs(p.x-ball.x)<30){
      ball.x+=8;
    }

    if(ball.x>c.width-50){
      endFootball();
    }

  },30);

  document.onkeydown=e=>{
    if(e.key==="ArrowUp")p.y-=10;
    if(e.key==="ArrowDown")p.y+=10;
    if(e.key==="ArrowLeft")p.x-=10;
    if(e.key==="ArrowRight")p.x+=10;
  };
}

function endFootball(){
  stopGame();
  let reward=100;
  if(data.risk) reward*=2;
  data.coins+=reward;
  save();
  show("games");
}

// ===== UPGRADES =====
function upgradeCoins(){
  if(data.coins>=50){
    data.coins-=50;
    save();
  }
}

// ===== SHOP =====
function riskUpgrade(){
  if(data.coins>=60){
    data.coins-=60;
    data.risk=true;
    save();
  }
}

// INIT
show("start");
save();

</script>

</body>
</html>
