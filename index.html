<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RETRO CASINO FIXED</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Press Start 2P';overflow:hidden;background:black}
canvas{position:absolute;top:0;left:0;width:100vw;height:100vh}
button{font-family:'Press Start 2P';background:#000;color:#0ff;border:3px solid #0ff;padding:20px;margin:15px;font-size:14px;cursor:pointer}
.hidden{display:none}
#startScreen{position:absolute;width:100%;height:100%;background:linear-gradient(#020024,#090979,#00d4ff);display:flex;flex-direction:column;justify-content:center;align-items:center;color:white}
#menuScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#ui{position:absolute;top:10px;left:10px;color:#0ff}
#bottomBar{position:absolute;bottom:10px;left:10px;color:#fff}
#version{position:absolute;bottom:10px;right:10px;color:#fff}
#patchNotes{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:3px solid #0ff;padding:20px;width:80%;max-height:70%;overflow:auto}
</style>
</head>
<body>

<div id="startScreen">
<h1>RETRO CASINO</h1>
<button id="startBtn">START</button>
<button id="patchBtn">PATCH NOTES</button>
<div id="version">VERSION 1.05</div>
</div>

<div id="patchNotes" class="hidden">
<h2>PATCH NOTES 1.05</h2>
<p>- Fullscreen gameplay</p>
<p>- Soccer players added</p>
<p>- Dash upgraded</p>
<p>- Betting visual</p>
<button id="closePatch">CLOSE</button>
</div>

<div id="ui" class="hidden">
<span>🪙 <span id="coins">0</span></span>
</div>

<div id="bottomBar" class="hidden">
<span id="user"></span> | LVL <span id="lvl"></span> | XP <span id="xp"></span>
</div>

<div id="menuScreen" class="hidden">
<button id="dashBtn">DASH RUN</button>
<button id="betBtn">RETRO BALL</button>
<button id="soccerBtn">SOCCER</button>
</div>

<div id="betScreen" class="hidden">
<h3 style="color:white">BET ON A TEAM</h3>
<button onclick="bet(0)">RED</button>
<button onclick="bet(1)">BLUE</button>
<button onclick="bet(2)">GREEN</button>
<button onclick="bet(3)">YELLOW</button>
</div>

<canvas id="game"></canvas>

<script>
let data=JSON.parse(localStorage.getItem('retroUltra'))||{coins:0,xp:0,lvl:1,user:null};
if(!data.user){data.user=prompt('ENTER USERNAME');}

const c=document.getElementById('game');
const ctx=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
resize();window.onresize=resize;

function save(){localStorage.setItem('retroUltra',JSON.stringify(data));document.getElementById('coins').innerText=data.coins;document.getElementById('xp').innerText=data.xp;document.getElementById('lvl').innerText=data.lvl;document.getElementById('user').innerText=data.user}

function startGame(){
document.getElementById('startScreen').classList.add('hidden');
document.getElementById('menuScreen').classList.remove('hidden');
document.getElementById('ui').classList.remove('hidden');
document.getElementById('bottomBar').classList.remove('hidden');
save();
}

function showPatch(){document.getElementById('patchNotes').classList.remove('hidden');}
function hidePatch(){document.getElementById('patchNotes').classList.add('hidden');}

// FIX: BUTTON EVENTS

document.getElementById('startBtn').onclick=startGame;
document.getElementById('patchBtn').onclick=showPatch;
document.getElementById('closePatch').onclick=hidePatch;

document.getElementById('dashBtn').onclick=()=>alert('Dash coming!');
document.getElementById('betBtn').onclick=()=>document.getElementById('betScreen').classList.remove('hidden');
document.getElementById('soccerBtn').onclick=()=>alert('Soccer coming!');

save();
</script>

</body>
</html>
