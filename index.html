<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Games 5.3</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:#000;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
z-index:10;
}

.hidden{display:none}

button{
padding:18px;
margin:10px;
background:black;
color:#0ff;
border:3px solid #0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1)}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
}

#editorBox{
width:600px;
height:350px;
border:5px solid white;
position:relative;
background:#111;
}

.player{
width:40px;
height:40px;
background:cyan;
position:absolute;
cursor:grab;
}
</style>
</head>
<body>

<div id="start" class="screen">
<h1>RETRO GAMES 5.3</h1>
<button onclick="go('menu')">START</button>
</div>

<div id="menu" class="screen hidden">
<button onclick="startSoccer()">SOCCER</button>
<button onclick="startDash()">DASH</button>
<button onclick="go('editor')">TEAM EDITOR</button>
<button onclick="go('settings')">SETTINGS</button>
</div>

<div id="settings" class="screen hidden">
<button onclick="setSpeed(1)">NORMAL</button>
<button onclick="setSpeed(2)">FAST</button>
<button onclick="setSpeed(3)">INSANE</button>
<button onclick="save()">SAVE</button>
<button onclick="go('menu')">BACK</button>
</div>

<div id="editor" class="screen hidden">
<div id="editorBox"></div>
<button onclick="saveLayout()">SAVE</button>
<button onclick="go('menu')">BACK</button>
</div>

<canvas id="game"></canvas>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("retroSave")) || {
layout:[{x:100,y:100},{x:250,y:200},{x:400,y:150}],
speed:1
};

function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
}

// ===== NAV =====
function go(id){
stopGame();
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
game.style.display="none";
if(id) document.getElementById(id).classList.remove("hidden");
}

// ===== EDITOR =====
let dragging=null;

function loadEditor(){
editorBox.innerHTML="";
data.layout.forEach(p=>{
let el=document.createElement("div");
el.className="player";
el.style.left=p.x+"px";
el.style.top=p.y+"px";

el.onmousedown=()=>dragging=el;
editorBox.appendChild(el);
});

document.onmousemove=e=>{
if(dragging){
let r=editorBox.getBoundingClientRect();
dragging.style.left=(e.clientX-r.left-20)+"px";
dragging.style.top=(e.clientY-r.top-20)+"px";
}
};
document.onmouseup=()=>dragging=null;
}

function saveLayout(){
document.querySelectorAll(".player").forEach((p,i)=>{
data.layout[i]={x:parseInt(p.style.left),y:parseInt(p.style.top)};
});
save();
}

// ===== CANVAS =====
const c=game;
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
onresize=resize;

let loop=null;
let keys={};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function stopGame(){
if(loop) clearInterval(loop);
loop=null;
}

// ===== SOCCER (PLAYABLE) =====
function startSoccer(){
go(null);
c.style.display="block";

let players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
let enemies=[{x:c.width-200,y:200},{x:c.width-200,y:350}];
let ball={x:c.width/2,y:c.height/2};

loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// field
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// ball
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// players
players.forEach(p=>{
ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,30,30);
});

// enemies
enemies.forEach(e=>{
let dx=ball.x-e.x;
let dy=ball.y-e.y;
e.x+=dx*0.05;
e.y+=dy*0.05;

ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,30,30);

// steal
if(Math.abs(e.x-ball.x)<25){
ball.x-=6;
}
});

// movement
let p=players[0];
let speed=6*data.speed;

if(keys["ArrowUp"])p.y-=speed;
if(keys["ArrowDown"])p.y+=speed;
if(keys["ArrowLeft"])p.x-=speed;
if(keys["ArrowRight"])p.x+=speed;

// ball lock
if(Math.abs(p.x-ball.x)<30){
ball.x=p.x;
ball.y=p.y;
}

// goals
if(ball.x>c.width-50 || ball.x<50){
ball.x=c.width/2;
ball.y=c.height/2;
players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
}

},30);
}

// ===== DASH (REAL GAME) =====
function startDash(){
go(null);
c.style.display="block";

let x=200;
let y=c.height-150;
let vel=0;
let gravity=1;

let spikes=[400,700,1000];

loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// background
ctx.fillStyle="#111";
ctx.fillRect(0,0,c.width,c.height);

// ground
ctx.fillStyle="#333";
ctx.fillRect(0,c.height-100,c.width,100);

// spikes
ctx.fillStyle="red";
spikes.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s,c.height-100);
ctx.lineTo(s+20,c.height-130);
ctx.lineTo(s+40,c.height-100);
ctx.fill();

// collision
if(x+40>s && x<s+40 && y>c.height-140){
alert("You died");
go("menu");
}
});

// cube
ctx.fillStyle="cyan";
ctx.fillRect(x,y,40,40);

// jump
if(keys[" "] && y>=c.height-150){
vel=-15;
}

vel+=gravity;
y+=vel;

if(y>c.height-150){
y=c.height-150;
vel=0;
}

x+=6;
if(x>c.width)x=0;

},30);
}

// INIT
go("start");
loadEditor();

</script>

</body>
</html>
