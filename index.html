<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 6.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:#0b0b0b;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2;
}

.hidden{display:none}

button{
padding:20px;
margin:10px;
background:black;
color:#0ff;
border:3px solid #0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1)}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#editorBox{
width:500px;
height:300px;
border:5px solid white;
position:relative;
margin-bottom:20px;
}

.player{
width:40px;
height:40px;
position:absolute;
background:blue;
cursor:grab;
}

.goalBtn{
padding:10px;
background:#2c6ed5;
margin:5px;
}

#topUI{position:absolute;top:10px;left:10px;z-index:3}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openEditor()">TEAM EDITOR</button>
</div>

<!-- GAMES -->
<div id="gamesScreen" class="screen hidden">
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- EDITOR -->
<div id="editorScreen" class="screen hidden">

<div id="editorBox"></div>

<div>
GOALS:
<button class="goalBtn" onclick="setGoals(1)">1</button>
<button class="goalBtn" onclick="setGoals(2)">2</button>
<button class="goalBtn" onclick="setGoals(3)">3</button>
</div>

<button onclick="saveLayout()">SAVE</button>
<button onclick="backMenu()">BACK</button>

</div>

<div id="topUI">🪙 <span id="coins">0</span></div>

<canvas id="game"></canvas>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0,
layout:[
{x:50,y:50},
{x:200,y:120},
{x:350,y:200}
],
goals:1
};

// SAVE
function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
coins.innerText=data.coins;
}

// SCREENS
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
if(id) document.getElementById(id).classList.remove("hidden");
}

// NAV
function startGame(){show("menuScreen")}
function openGames(){show("gamesScreen")}
function openEditor(){show("editorScreen"); loadEditor()}
function backMenu(){show("menuScreen")}

// ===== EDITOR =====
let dragging=null;

function loadEditor(){
let box=document.getElementById("editorBox");
box.innerHTML="";

data.layout.forEach((p,i)=>{
let el=document.createElement("div");
el.className="player";
el.style.left=p.x+"px";
el.style.top=p.y+"px";

el.onmousedown=()=>dragging=el;

box.appendChild(el);
});

document.onmousemove=e=>{
if(dragging){
let rect=box.getBoundingClientRect();
dragging.style.left=(e.clientX-rect.left-20)+"px";
dragging.style.top=(e.clientY-rect.top-20)+"px";
}
};

document.onmouseup=()=>dragging=null;
}

function saveLayout(){
let players=document.querySelectorAll(".player");
players.forEach((p,i)=>{
data.layout[i]={
x:parseInt(p.style.left),
y:parseInt(p.style.top)
};
});
save();
alert("Saved!");
}

function setGoals(n){
data.goals=n;
save();
}

// ===== GAME =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.onresize=resize;

let loop;

function startSoccer(){
show("");
clearInterval(loop);

// load layout
let players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
let enemies=[
{x:c.width-200,y:200},
{x:c.width-200,y:350},
{x:c.width-200,y:500}
];

let ball={x:c.width/2,y:c.height/2};
let current=0;

let score=0;
let enemyScore=0;

// GAME LOOP
loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// field
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// goals
ctx.fillStyle="white";
ctx.fillRect(20,c.height/2-100,20,200);
ctx.fillRect(c.width-40,c.height/2-100,20,200);

// BALL
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// PLAYERS
players.forEach(p=>{
ctx.fillStyle="blue";
ctx.fillRect(p.x,p.y,30,30);
});

// ENEMIES (FIXED AI SPACING)
enemies.forEach((e,i)=>{
let dx=ball.x-e.x;
let dy=ball.y-e.y;

e.x+=dx*0.02;
e.y+=dy*0.02;

// separation (fix merging)
enemies.forEach(other=>{
if(other!==e){
let dist=Math.hypot(e.x-other.x,e.y-other.y);
if(dist<40){
e.x+=(e.x-other.x)*0.05;
e.y+=(e.y-other.y)*0.05;
}
}
});

ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,30,30);

// steal ball
if(Math.abs(e.x-ball.x)<25){
ball.x-=4;
}
});

// PLAYER CONTROL
let p=players[current];

if(Math.abs(p.x-ball.x)<30){
ball.x=p.x;
ball.y=p.y;
}

// movement
document.onkeydown=e=>{
if(e.key==="ArrowUp")p.y-=10;
if(e.key==="ArrowDown")p.y+=10;
if(e.key==="ArrowLeft")p.x-=10;
if(e.key==="ArrowRight")p.x+=10;
};

// PASS (BIG HITBOX)
document.onclick=e=>{
players.forEach((pl,i)=>{
if(Math.abs(e.clientX-pl.x)<80 && Math.abs(e.clientY-pl.y)<80){
current=i;
ball.x=pl.x;
ball.y=pl.y;
}
});
};

// GOALS
if(ball.x>c.width-50){
score++;
resetPositions();
}
if(ball.x<50){
enemyScore++;
resetPositions();
}

ctx.fillStyle="white";
ctx.fillText(score+" - "+enemyScore, c.width/2,50);

if(score>=data.goals || enemyScore>=data.goals){
endGame(score>enemyScore);
}

},30);

// RESET FIX (NO DRIFT)
function resetPositions(){
ball.x=c.width/2;
ball.y=c.height/2;

players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));

enemies=[
{x:c.width-200,y:200},
{x:c.width-200,y:350},
{x:c.width-200,y:500}
];
}

function endGame(win){
clearInterval(loop);
data.coins+=win?100:30;
save();
show("gamesScreen");
}

}

show("startScreen");
save();

</script>

</body>
</html>
