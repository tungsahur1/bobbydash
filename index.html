<!DOCTYPE html>
<html>
<head>
<title>Retro Games 5.3</title>
<style>
body {
    margin:0;
    background:black;
    color:#00ffff;
    font-family: monospace;
    overflow:hidden;
}

/* UI */
.screen {
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active { display:flex; }

button {
    font-size:20px;
    padding:15px 40px;
    margin:10px;
    background:black;
    color:#00ffff;
    border:3px solid #00ffff;
    cursor:pointer;
}
button:hover { transform:scale(1.1); }

#coins {
    position:absolute;
    top:10px;
    left:10px;
    color:gold;
    font-size:20px;
}

canvas {
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div id="coins">Coins: 100</div>

<!-- MAIN MENU -->
<div id="menu" class="screen active">
    <h1>RETRO GAMES</h1>
    <button onclick="go('soccerMenu')">SOCCER</button>
    <button onclick="startDash()">DASH</button>
</div>

<!-- SOCCER MENU -->
<div id="soccerMenu" class="screen">
    <h2>SOCCER</h2>
    <button onclick="startSoccer()">PLAY</button>
    <button onclick="go('menu')">BACK</button>
</div>

<canvas id="game"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* SCREEN SYSTEM */
function go(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    running = false;
}

/* GLOBAL */
let running = false;
let coins = 100;

/* =========================
   SOCCER (FIXED + PLAYABLE)
========================= */

let player, ball, enemies;

function startSoccer(){
    go(""); // hide UI
    running = true;

    player = {x:200,y:300,vx:0,vy:0};
    ball = {x:400,y:300};
    enemies = [
        {x:700,y:200},
        {x:700,y:400}
    ];

    loop = soccerLoop;
    requestAnimationFrame(loop);
}

/* MOVEMENT FIX (no delay, multi key) */
let keys = {};
window.onkeydown = e=>keys[e.key]=true;
window.onkeyup = e=>keys[e.key]=false;

function soccerLoop(){
    if(!running) return;

    ctx.fillStyle="green";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* PLAYER MOVEMENT */
    if(keys["ArrowUp"]) player.y -=5;
    if(keys["ArrowDown"]) player.y +=5;
    if(keys["ArrowLeft"]) player.x -=5;
    if(keys["ArrowRight"]) player.x +=5;

    /* KEEP IN BOUNDS (FIX BUG) */
    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    /* BALL FOLLOW */
    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    if(Math.hypot(dx,dy) < 50){
        ball.x = player.x + 20;
        ball.y = player.y;
    }

    /* ENEMY AI (FIXED: no merging + chase ball) */
    enemies.forEach(e=>{
        let dx = ball.x - e.x;
        let dy = ball.y - e.y;
        let dist = Math.hypot(dx,dy);
        e.x += dx/dist * 2;
        e.y += dy/dist * 2;

        /* steal ball */
        if(Math.hypot(e.x-ball.x, e.y-ball.y)<30){
            ball.x = e.x;
            ball.y = e.y;
        }
    });

    /* GOAL */
    if(ball.x > canvas.width-50){
        coins+=10;
        updateCoins();
        endGame();
        return;
    }

    /* DRAW */
    ctx.fillStyle="blue";
    ctx.fillRect(player.x,player.y,20,20);

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.fillRect(e.x,e.y,20,20);
    });

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
    ctx.fill();

    requestAnimationFrame(soccerLoop);
}

/* =========================
   DASH (WORKING)
========================= */

let cube, spikes;

function startDash(){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    running = true;

    cube = {x:100,y:300,vy:0};
    spikes = [
        {x:400},
        {x:700}
    ];

    loop = dashLoop;
    requestAnimationFrame(loop);
}

function dashLoop(){
    if(!running) return;

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* gravity */
    cube.vy +=0.5;
    cube.y += cube.vy;

    /* jump */
    if(keys[" "] && cube.y > 300){
        cube.vy = -10;
    }

    /* floor */
    if(cube.y > 300){
        cube.y = 300;
        cube.vy = 0;
    }

    /* move spikes */
    spikes.forEach(s=>{
        s.x -=6;
        if(s.x < -20) s.x = canvas.width + Math.random()*300;

        /* COLLISION FIX */
        if(cube.x < s.x+20 &&
           cube.x+20 > s.x &&
           cube.y+20 > 300){
            endGame();
        }

        ctx.fillStyle="red";
        ctx.fillRect(s.x,300,20,20);
    });

    ctx.fillStyle="cyan";
    ctx.fillRect(cube.x,cube.y,20,20);

    requestAnimationFrame(dashLoop);
}

/* ========================= */

function endGame(){
    running = false;
    go("menu");
}

function updateCoins(){
    document.getElementById("coins").innerText = "Coins: "+coins;
}
</script>

</body>
</html>
