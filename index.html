<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 5.2 FIXED</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Press Start 2P';
background:#000;
color:#0ff;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.8);
z-index:10;
}

.hidden{display:none}

button{
padding:20px;
margin:10px;
background:black;
color:#0ff;
border:3px solid #0ff;
cursor:pointer;
}
button:hover{transform:scale(1.1)}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
display:none;
}

#editorBox{
width:500px;
height:300px;
border:3px solid white;
position:relative;
margin-bottom:20px;
}

.player{
width:30px;
height:30px;
background:blue;
position:absolute;
cursor:grab;
}
</style>
</head>
<body>

<!-- START -->
<div id="start" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="go('menu')">START</button>
</div>

<!-- MENU -->
<div id="menu" class="screen hidden">
<button onclick="go('soccerMenu')">SOCCER</button>
<button onclick="go('editor')">TEAM EDITOR</button>
<button onclick="go('settings')">SETTINGS</button>
</div>

<!-- SOCCER MENU -->
<div id="soccerMenu" class="screen hidden">
<button onclick="startSoccer()">NORMAL</button>
<button onclick="go('menu')">BACK</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen hidden">
<h3>DIFFICULTY</h3>
<button onclick="setDiff(1)">EASY</button>
<button onclick="setDiff(2)">NORMAL</button>
<button onclick="setDiff(3)">HARD</button>

<button onclick="go('menu')">BACK</button>
</div>

<!-- EDITOR -->
<div id="editor" class="screen hidden">
<div id="editorBox"></div>

<button onclick="saveLayout()">SAVE</button>
<button onclick="go('menu')">BACK</button>
</div>

<canvas id="game"></canvas>

<script>

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("retroSave")) || {
coins:0,
layout:[{x:50,y:50},{x:200,y:150},{x:350,y:250}],
difficulty:2
};

// ===== SAVE =====
function save(){
localStorage.setItem("retroSave",JSON.stringify(data));
}

// ===== SCREEN SYSTEM (FIXED) =====
function go(id){
stopGame();

document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById("game").style.display="none";

if(id) document.getElementById(id).classList.remove("hidden");
}

// ===== SETTINGS =====
function setDiff(d){data.difficulty=d;save();}

// ===== EDITOR =====
let dragging=null;

function loadEditor(){
let box=document.getElementById("editorBox");
box.innerHTML="";

data.layout.forEach(p=>{
let el=document.createElement("div");
el.className="player";
el.style.left=p.x+"px";
el.style.top=p.y+"px";

el.onmousedown=()=>dragging=el;
box.appendChild(el);
});

document.onmousemove=e=>{
if(dragging){
let r=box.getBoundingClientRect();
dragging.style.left=(e.clientX-r.left-15)+"px";
dragging.style.top=(e.clientY-r.top-15)+"px";
}
};

document.onmouseup=()=>dragging=null;
}

function saveLayout(){
document.querySelectorAll(".player").forEach((p,i)=>{
data.layout[i]={x:parseInt(p.style.left),y:parseInt(p.style.top)};
});
save();
alert("Saved!");
}

// ===== GAME =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
onresize=resize;

let loop=null;
let keys={};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// ===== STOP LOOP (CRITICAL FIX) =====
function stopGame(){
if(loop) clearInterval(loop);
loop=null;
}

// ===== SOCCER =====
function startSoccer(){

go(null);
c.style.display="block";

let players=data.layout.map(p=>({x:p.x+100,y:p.y+100}));
let enemies=[
{x:c.width-200,y:200},
{x:c.width-200,y:350},
{x:c.width-200,y:500}
];

let ball={x:c.width/2,y:c.height/2};
let current=0;

loop=setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);

// field
ctx.fillStyle="green";
ctx.fillRect(0,0,c.width,c.height);

// ball
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ball.x,ball.y,10,0,6.28);
ctx.fill();

// players
players.forEach(p=>{
ctx.fillStyle="blue";
ctx.fillRect(p.x,p.y,30,30);
});

// enemies FIXED
enemies.forEach(e=>{
let dx=ball.x-e.x;
let dy=ball.y-e.y;
e.x+=dx*0.03*data.difficulty;
e.y+=dy*0.03*data.difficulty;

ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,30,30);

// steal
if(Math.abs(e.x-ball.x)<25){
ball.x-=5;
}
});

// movement (SMOOTH FIX)
let p=players[current];
let speed=6;

if(keys["ArrowUp"])p.y-=speed;
if(keys["ArrowDown"])p.y+=speed;
if(keys["ArrowLeft"])p.x-=speed;
if(keys["ArrowRight"])p.x+=speed;

// lock ball
if(Math.abs(p.x-ball.x)<30){
ball.x=p.x;
ball.y=p.y;
}

},30);

}

// INIT
go("start");
loadEditor();

</script>

</body>
</html>
