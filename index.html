<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Press Start 2P';
  background:black;
  color:#0ff;
  overflow:hidden;
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hidden{display:none}

button{
  font-family:'Press Start 2P';
  padding:20px;
  margin:10px;
  background:black;
  color:#0ff;
  border:3px solid #0ff;
  cursor:pointer;
}

#topUI{
  position:absolute;
  top:10px;
  left:10px;
}

#bottomUI{
  position:absolute;
  bottom:10px;
  left:10px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openUpgrades()">UPGRADES</button>
<button onclick="openShop()">SHOP</button>
</div>

<!-- GAMES -->
<div id="gamesScreen" class="screen hidden">
<button onclick="startDash()">DASH</button>
<button onclick="openBet()">BETTING</button>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- BET -->
<div id="betScreen" class="screen hidden">
<h3>BET ON TEAM</h3>
<button onclick="bet(0)">RED</button>
<button onclick="bet(1)">BLUE</button>
<button onclick="bet(2)">GREEN</button>
<button onclick="bet(3)">YELLOW</button>
<button onclick="backGames()">BACK</button>
</div>

<!-- UPGRADES -->
<div id="upgradeScreen" class="screen hidden">
<h3>UPGRADES</h3>
<button onclick="upgradeCoins()">COIN BOOST</button>
<button onclick="upgradeLuck()">LUCK</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
<h3>SHOP</h3>
<button onclick="buyBoost()">BUY BOOST (50)</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- UI -->
<div id="topUI">🪙 <span id="coins">0</span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("retroSave")) || {
  coins:0,
  lvl:1,
  user:null,
  boost:1,
  luck:1
};

if(!data.user){
  data.user = prompt("Enter username");
}

// ELEMENTS
const screens = {
  start:startScreen,
  menu:menuScreen,
  games:gamesScreen,
  bet:betScreen,
  upgrade:upgradeScreen,
  shop:shopScreen
};

function show(name){
  Object.values(screens).forEach(s=>s.classList.add("hidden"));
  screens[name].classList.remove("hidden");
}

// SAVE
function save(){
  localStorage.setItem("retroSave", JSON.stringify(data));
  coins.innerText = data.coins;
  lvl.innerText = data.lvl;
  user.innerText = data.user;
}

// NAV
function startGame(){
  show("menu");
  save();
}

function openGames(){show("games")}
function openUpgrades(){show("upgrade")}
function openShop(){show("shop")}
function backMenu(){show("menu")}
function backGames(){show("games")}
function openBet(){show("bet")}

// DASH GAME
function startDash(){
  show("start"); // hide UI
  let reward = Math.floor(Math.random()*50*data.boost)+10;
  setTimeout(()=>{
    alert("Dash finished +" + reward);
    data.coins += reward;
    data.lvl++;
    save();
    show("menu");
  },1500);
}

// BET GAME
function bet(choice){
  show("start");
  let win = Math.floor(Math.random()*4);
  setTimeout(()=>{
    if(choice===win){
      let reward = 100*data.luck;
      alert("WIN +" + reward);
      data.coins += reward;
    }else{
      alert("LOSE");
    }
    save();
    show("menu");
  },1500);
}

// SOCCER
function startSoccer(){
  show("start");
  let win = Math.random()>0.5;
  setTimeout(()=>{
    if(win){
      let reward = 80*data.boost;
      alert("GOAL +" + reward);
      data.coins += reward;
    }else{
      alert("MISSED");
    }
    save();
    show("menu");
  },1500);
}

// UPGRADES
function upgradeCoins(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=0.5;
    alert("BOOST UPGRADED");
    save();
  }
}

function upgradeLuck(){
  if(data.coins>=75){
    data.coins-=75;
    data.luck+=0.5;
    alert("LUCK UPGRADED");
    save();
  }
}

// SHOP
function buyBoost(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=1;
    alert("BOOST BOUGHT");
    save();
  }
}

// INIT
show("start");
save();

</script>

</body>
</html>
