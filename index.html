<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino FINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Press Start 2P';
  background:black;
  color:#0ff;
  overflow:hidden;
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hidden{display:none}

button{
  font-family:'Press Start 2P';
  padding:20px;
  margin:10px;
  background:black;
  color:#0ff;
  border:3px solid #0ff;
  cursor:pointer;
}

#topUI{
  position:absolute;
  top:10px;
  left:10px;
}

#bottomUI{
  position:absolute;
  bottom:10px;
  left:10px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openUpgrades()">UPGRADES</button>
<button onclick="openShop()">SHOP</button>
</div>

<!-- GAMES -->
<div id="gamesScreen" class="screen hidden">
<button onclick="startDash()">DASH</button>
<button onclick="openBet()">BETTING</button>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- BET -->
<div id="betScreen" class="screen hidden">
<h3>BET ON TEAM</h3>
<button onclick="bet(0)">RED</button>
<button onclick="bet(1)">BLUE</button>
<button onclick="bet(2)">GREEN</button>
<button onclick="bet(3)">YELLOW</button>
<button onclick="backGames()">BACK</button>
</div>

<!-- UPGRADES -->
<div id="upgradeScreen" class="screen hidden">
<h3>UPGRADES</h3>
<button onclick="upgradeCoins()">COIN BOOST (50)</button>
<button onclick="upgradeLuck()">LUCK (75)</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen hidden">
<h3>SHOP</h3>
<button onclick="buyBoost()">BUY BOOST (50)</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- UI -->
<div id="topUI">🪙 <span id="coins">0</span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// SAFE ELEMENT GET (NO CRASH)
const screens = {
  start: document.getElementById("startScreen"),
  menu: document.getElementById("menuScreen"),
  games: document.getElementById("gamesScreen"),
  bet: document.getElementById("betScreen"),
  upgrade: document.getElementById("upgradeScreen"),
  shop: document.getElementById("shopScreen")
};

// SAFE SCREEN SWITCH
function show(name){
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  if (screens[name]) screens[name].classList.remove("hidden");
}

// DATA
let data = JSON.parse(localStorage.getItem("retroSave")) || {
  coins:0,
  lvl:1,
  user:null,
  boost:1,
  luck:1
};

if(!data.user){
  data.user = prompt("Enter username");
}

// SAVE SYSTEM
function save(){
  localStorage.setItem("retroSave", JSON.stringify(data));
  document.getElementById("coins").innerText = data.coins;
  document.getElementById("lvl").innerText = data.lvl;
  document.getElementById("user").innerText = data.user;
}

// NAVIGATION
function startGame(){ show("menu"); save(); }
function openGames(){ show("games"); }
function openUpgrades(){ show("upgrade"); }
function openShop(){ show("shop"); }
function backMenu(){ show("menu"); }
function backGames(){ show("games"); }
function openBet(){ show("bet"); }

// DASH
function startDash(){
  show(null);
  setTimeout(()=>{
    let reward = Math.floor(Math.random()*50*data.boost)+10;
    alert("Dash +" + reward);
    data.coins += reward;
    data.lvl++;
    save();
    show("menu");
  },1000);
}

// BET
function bet(choice){
  show(null);
  setTimeout(()=>{
    let win = Math.floor(Math.random()*4);
    if(choice===win){
      let reward = 100*data.luck;
      alert("WIN +" + reward);
      data.coins += reward;
    } else {
      alert("LOSE");
    }
    save();
    show("menu");
  },1000);
}

// SOCCER
function startSoccer(){
  show(null);
  setTimeout(()=>{
    let win = Math.random()>0.5;
    if(win){
      let reward = 80*data.boost;
      alert("GOAL +" + reward);
      data.coins += reward;
    } else {
      alert("MISSED");
    }
    save();
    show("menu");
  },1000);
}

// UPGRADES
function upgradeCoins(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=0.5;
    alert("BOOST UP");
    save();
  }
}

function upgradeLuck(){
  if(data.coins>=75){
    data.coins-=75;
    data.luck+=0.5;
    alert("LUCK UP");
    save();
  }
}

// SHOP
function buyBoost(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=1;
    alert("BOOST BOUGHT");
    save();
  }
}

// INIT (THIS FIXES YOUR START BUG)
show("start");
save();

</script>

</body>
</html>
