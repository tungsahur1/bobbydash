<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Casino 2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Press Start 2P';
  background:black;
  color:#0ff;
  overflow:hidden;
}

/* BACKGROUND SPLIT */
.bg{
  background: linear-gradient(to right,
    url('https://i.imgur.com/1.png') 33%,
    url('https://i.imgur.com/2.png') 66%,
    url('https://i.imgur.com/3.png') 100%);
}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hidden{display:none}

/* BUTTONS */
button{
  font-family:'Press Start 2P';
  padding:25px;
  margin:15px;
  font-size:16px;
  background:black;
  color:#0ff;
  border:4px solid #0ff;
  cursor:pointer;
  transition:0.15s;
}

button:hover{
  transform:scale(1.1);
}

#topUI{
  position:absolute;
  top:10px;
  left:10px;
}

#bottomUI{
  position:absolute;
  bottom:10px;
  left:10px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen bg">
<h1>RETRO CASINO</h1>
<button onclick="startGame()">START</button>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen bg hidden">
<button onclick="openGames()">PLAY</button>
<button onclick="openUpgrades()">UPGRADES</button>
<button onclick="openShop()">SHOP</button>
</div>

<!-- GAMES -->
<div id="gamesScreen" class="screen hidden">
<button onclick="startDash()">DASH</button>
<button onclick="openBet()">BETTING</button>
<button onclick="startSoccer()">SOCCER</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- BET -->
<div id="betScreen" class="screen hidden">
<h3>BET ON TEAM</h3>
<button onclick="betGame(0)">RED</button>
<button onclick="betGame(1)">BLUE</button>
<button onclick="backGames()">BACK</button>
</div>

<!-- UPGRADES -->
<div id="upgradeScreen" class="screen bg hidden">
<h3>UPGRADES</h3>
<button onclick="upgradeCoins()">COIN BOOST</button>
<button onclick="upgradeDifficulty()">HARDER GAMES</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen bg hidden">
<h3>SHOP</h3>
<button onclick="buyBoost()">BOOST (50)</button>
<button onclick="backMenu()">BACK</button>
</div>

<!-- UI -->
<div id="topUI">🪙 <span id="coins">0</span></div>
<div id="bottomUI"><span id="user"></span> | LVL <span id="lvl"></span></div>

<canvas id="game"></canvas>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("retroSave")) || {
  coins:0,
  lvl:1,
  user:null,
  boost:1,
  difficulty:1
};

if(!data.user){
  data.user = prompt("Enter username");
}

// SCREENS
const screens = {
  start: document.getElementById("startScreen"),
  menu: document.getElementById("menuScreen"),
  games: document.getElementById("gamesScreen"),
  bet: document.getElementById("betScreen"),
  upgrade: document.getElementById("upgradeScreen"),
  shop: document.getElementById("shopScreen")
};

function show(name){
  Object.values(screens).forEach(s => s.classList.add("hidden"));
  if(screens[name]) screens[name].classList.remove("hidden");
}

// SAVE
function save(){
  localStorage.setItem("retroSave", JSON.stringify(data));
  coins.innerText = data.coins;
  lvl.innerText = data.lvl;
  user.innerText = data.user;
}

// NAV
function startGame(){ show("menu"); save(); }
function openGames(){ show("games"); }
function openUpgrades(){ show("upgrade"); }
function openShop(){ show("shop"); }
function backMenu(){ show("menu"); }
function backGames(){ show("games"); }
function openBet(){ show("bet"); }

// CANVAS
const c = document.getElementById("game");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let loop;
function stopGame(){
  clearInterval(loop);
  document.onkeydown = null;
}

// ================= DASH =================
function startDash(){
  stopGame();
  show(null);

  let y = c.height - 150;
  let vy = 0;
  let spikes = [];

  loop = setInterval(()=>{
    ctx.fillStyle="black";
    ctx.fillRect(0,0,c.width,c.height);

    vy += 1;
    y += vy;
    if(y > c.height-150){ y=c.height-150; vy=0 }

    ctx.fillStyle="white";
    ctx.fillRect(150,y,50,50);

    if(Math.random() < 0.03 * data.difficulty){
      spikes.push({x:c.width});
    }

    ctx.fillStyle="red";
    spikes.forEach(s=>{
      s.x -= 10 + data.difficulty*2;
      ctx.fillRect(s.x,c.height-150,40,40);

      if(s.x < 200 && s.x > 120 && y > c.height-200){
        endDash();
      }
    });

  },30);

  document.onkeydown = e=>{
    if(e.key==="ArrowUp" && y===c.height-150) vy=-20;
  };
}

function endDash(){
  stopGame();
  let reward = Math.floor(50*data.boost);
  data.coins += reward;
  data.lvl++;
  alert("Dash +" + reward);
  save();
  show("menu");
}

// ================= SOCCER =================
function startSoccer(){
  stopGame();
  show(null);

  let p = {x:100,y:c.height/2};
  let ball = {x:130,y:c.height/2};

  loop = setInterval(()=>{
    ctx.fillStyle="green";
    ctx.fillRect(0,0,c.width,c.height);

    // goal
    ctx.fillStyle="white";
    ctx.fillRect(c.width-50,c.height/2-100,10,200);

    // player
    ctx.fillStyle="blue";
    ctx.fillRect(p.x,p.y,40,40);

    // ball
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,10,0,6.28);
    ctx.fill();

    // follow player
    ball.x = p.x+30;
    ball.y = p.y+20;

    if(ball.x > c.width-60){
      endSoccer(true);
    }

  },30);

  document.onkeydown = e=>{
    if(e.key==="ArrowUp") p.y -=10;
    if(e.key==="ArrowDown") p.y +=10;
    if(e.key==="ArrowLeft") p.x -=10;
    if(e.key==="ArrowRight") p.x +=10;
  };
}

function endSoccer(win){
  stopGame();
  if(win){
    let reward = 100;
    data.coins += reward;
    alert("GOAL +" + reward);
  }
  save();
  show("menu");
}

// ================= BET =================
function betGame(choice){
  stopGame();
  show(null);

  let red=0, blue=0;

  loop = setInterval(()=>{
    ctx.fillStyle="black";
    ctx.fillRect(0,0,c.width,c.height);

    red += Math.random()*5;
    blue += Math.random()*5;

    ctx.fillStyle="red";
    ctx.fillRect(red,200,50,50);

    ctx.fillStyle="blue";
    ctx.fillRect(blue,300,50,50);

    if(red>c.width-100 || blue>c.width-100){
      stopGame();
      let winner = red>blue ? 0:1;

      if(winner===choice){
        data.coins += 100;
        alert("WIN!");
      }else{
        alert("LOSE!");
      }

      save();
      show("menu");
    }

  },30);
}

// ================= UPGRADES =================
function upgradeCoins(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=0.5;
    save();
  }
}

function upgradeDifficulty(){
  if(data.coins>=75){
    data.coins-=75;
    data.difficulty+=0.5;
    save();
  }
}

// ================= SHOP =================
function buyBoost(){
  if(data.coins>=50){
    data.coins-=50;
    data.boost+=1;
    save();
  }
}

// INIT
show("start");
save();

</script>

</body>
</html>
